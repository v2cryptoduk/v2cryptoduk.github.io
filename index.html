<!doctype html>
<html class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robo Symbol NFT Generator</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'VT323', monospace; }
    .win95-border { border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; }
    .win95-border-inset { border: 2px solid; border-color: #808080 #ffffff #ffffff #808080; }
    .win95-btn { border: 2px solid; border-color: #ffffff #000000 #000000 #ffffff; background: #c0c0c0; }
    .win95-btn:active { border-color: #000000 #ffffff #ffffff #000000; }
    .title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 2px 4px; }
    .robot-cell { display: flex; align-items: center; justify-content: center; font-size: 1.2rem; line-height: 1; }
    .nft-card { cursor: pointer; transition: transform 0.1s; }
    .nft-card:hover { transform: scale(1.02); }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-[#008080] overflow-auto">
  <div class="h-full w-full p-4"><!-- Title Bar Window -->
   <div class="win95-border bg-[#c0c0c0] max-w-6xl mx-auto">
    <div class="title-bar flex items-center justify-between"><span id="site-title" class="text-lg">⚙️ Robo Symbol NFT Generator</span>
     <div class="flex gap-1"><button class="win95-btn w-5 h-4 text-xs leading-none">_</button> <button class="win95-btn w-5 h-4 text-xs leading-none">□</button> <button class="win95-btn w-5 h-4 text-xs leading-none">✕</button>
     </div>
    </div>
    <div class="p-3"><!-- Controls -->
     <div class="flex flex-wrap gap-2 mb-4 items-center"><button id="generate-btn" class="win95-btn px-4 py-1 text-lg">🤖 Generate NFT</button> <button id="generate-10-btn" class="win95-btn px-4 py-1 text-lg">⚡ Generate 10</button> <button id="download-all-btn" class="win95-btn px-4 py-1 text-lg">💾 Download All</button> <span class="text-sm ml-2" id="count-label">Collection: 0 NFTs</span>
     </div><!-- NFT Grid -->
     <div class="win95-border-inset bg-white p-3 min-h-[300px]">
      <div id="nft-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>
      <p id="empty-msg" class="text-center text-gray-500 text-xl py-10">Click "Generate NFT" to create your first robot!</p>
     </div>
    </div>
   </div><!-- Modal -->
   <div id="modal" class="modal-overlay hidden">
    <div class="win95-border bg-[#c0c0c0] w-[90%] max-w-md">
     <div class="title-bar flex items-center justify-between"><span>📋 NFT Metadata</span> <button id="modal-close" class="win95-btn w-5 h-4 text-xs leading-none">✕</button>
     </div>
     <div class="p-4">
      <div id="modal-robot" class="win95-border-inset bg-black p-2 mb-3 flex items-center justify-center"></div>
      <div id="modal-meta" class="win95-border-inset bg-white p-2 text-sm mb-3 overflow-auto max-h-[200px]"></div><button id="download-btn" class="win95-btn px-4 py-1 text-lg w-full">💾 Download JSON</button>
     </div>
    </div>
   </div>
  </div>
  <script>
    // Config
    const defaultConfig = {
      site_title: 'Robo Symbol NFT Generator',
      background_color: '#008080',
      surface_color: '#c0c0c0',
      text_color: '#000000',
      primary_action: '#000080',
      secondary_action: '#808080',
      font_family: 'VT323',
      font_size: 16
    };

    let nfts = [];
    let selectedNft = null;

    // Robot generation
    const HEAD_PARTS = ['⌐■-■','[◉_◉]','(⊙_⊙)','【☰☰】','⟨◈◈⟩','[▓▓▓]','(◕‿◕)','⟦⊡⊡⟧','[●_●]','(⊞_⊞)','【◉‿◉】','⟨▣_▣⟩','[⊕⊕]','(◎‿◎)','⟦■_■⟧'];
    const BODY_PARTS = ['╔═╗║█║╚═╝','┌─┐│♦│└─┘','╭─╮│◆│╰─╯','┏━┓┃▓┃┗━┛','╔═╗║◈║╚═╝','┌─┐│⊞│└─┘','╭─╮│▣│╰─╯','┏━┓┃⊡┃┗━┛'];
    const ARMS = ['═╡  ╞═','─┤  ├─','━┥  ┝━','≡╡  ╞≡','─╢  ╟─','⊣   ⊢','╾╡  ╞╼'];
    const LEGS = ['╨    ╨','┴    ┴','╧    ╧','⊥    ⊥','╩    ╩'];
    const ANTENNAS = ['  ╦  ','  ┬  ','  ╥  ','  ⊤  ',' ╔╦╗ ',' ┌┬┐ ','  ↑  ','  ⌇  '];
    const TRAITS = ['Warrior','Scientist','Artist','Explorer','Guardian','Hacker','Mystic','Builder','Healer','Rogue'];
    const RARITIES = ['Common','Uncommon','Rare','Epic','Legendary'];
    const BG_PALETTES = [
      ['#1a1a2e','#16213e','#0f3460'],
      ['#2d132c','#510a32','#801336'],
      ['#0a3d62','#3c6382','#60a3bc'],
      ['#1b1b2f','#162447','#1f4068'],
      ['#0c0032','#190061','#240090'],
      ['#2c003e','#512b58','#818181'],
      ['#1a002e','#3d0066','#7a00cc'],
    ];
    const COLORS = ['#00ff41','#ff6600','#00ccff','#ff00ff','#ffff00','#ff3366','#66ff33','#33ccff','#ff9900','#cc33ff'];

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function randInt(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }

    function generateRobot() {
      const id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
      const antenna = pick(ANTENNAS);
      const head = pick(HEAD_PARTS);
      const arms = pick(ARMS);
      const body = pick(BODY_PARTS);
      const legs = pick(LEGS);
      const palette = pick(BG_PALETTES);
      const symbolColors = [pick(COLORS), pick(COLORS), pick(COLORS)];
      const trait = pick(TRAITS);
      const rarity = pick(RARITIES);
      const power = randInt(10, 99);
      const defense = randInt(10, 99);
      const speed = randInt(10, 99);

      return {
        id, antenna, head, arms, body, legs,
        bgPalette: palette, symbolColors, trait, rarity,
        power, defense, speed,
        name: `RoboSym #${nfts.length + 1}`,
        created: new Date().toISOString()
      };
    }

    function renderRobotHTML(nft, size='md') {
      const s = size === 'sm' ? 'text-xs' : 'text-sm';
      const bg = `linear-gradient(135deg, ${nft.bgPalette[0]}, ${nft.bgPalette[1]}, ${nft.bgPalette[2]})`;
      const [c1,c2,c3] = nft.symbolColors;
      return `<div style="background:${bg}; padding:8px; border-radius:2px; text-align:center; line-height:1.3;" class="${s}">
        <div style="color:${c1}">${nft.antenna}</div>
        <div style="color:${c2}">${nft.head}</div>
        <div style="color:${c3}">${nft.arms}</div>
        <div style="color:${c1}">${nft.body.slice(0,3)}</div>
        <div style="color:${c2}">${nft.body.slice(3,6)}</div>
        <div style="color:${c3}">${nft.body.slice(6)}</div>
        <div style="color:${c1}">${nft.legs}</div>
      </div>`;
    }

    function renderGrid() {
      const grid = document.getElementById('nft-grid');
      const empty = document.getElementById('empty-msg');
      empty.classList.toggle('hidden', nfts.length > 0);
      document.getElementById('count-label').textContent = `Collection: ${nfts.length} NFTs`;

      grid.innerHTML = nfts.map(nft => `
        <div class="nft-card win95-border bg-[#c0c0c0] p-1">
          <div onclick="showModal('${nft.id}')" style="cursor:pointer;">
            ${renderRobotHTML(nft, 'sm')}
            <div class="text-center text-xs mt-1 truncate">${nft.name}</div>
            <div class="text-center text-xs text-gray-600">${nft.rarity}</div>
          </div>
          <button class="win95-btn w-full text-xs mt-1 py-0" onclick="downloadNFT('${nft.id}')">💾 JSON</button>
        </div>
      `).join('');
    }

    function showModal(id) {
      selectedNft = nfts.find(n => n.id === id);
      if (!selectedNft) return;
      document.getElementById('modal-robot').innerHTML = renderRobotHTML(selectedNft, 'md');
      document.getElementById('modal-meta').innerHTML = `
        <p><b>Name:</b> ${selectedNft.name}</p>
        <p><b>Trait:</b> ${selectedNft.trait}</p>
        <p><b>Rarity:</b> ${selectedNft.rarity}</p>
        <p><b>Power:</b> ${selectedNft.power}</p>
        <p><b>Defense:</b> ${selectedNft.defense}</p>
        <p><b>Speed:</b> ${selectedNft.speed}</p>
        <p><b>Created:</b> ${new Date(selectedNft.created).toLocaleString()}</p>
        <p><b>ID:</b> ${selectedNft.id}</p>
      `;
      document.getElementById('modal').classList.remove('hidden');
    }

    function downloadJSON() {
      if (!selectedNft) return;
      const nftIndex = nfts.findIndex(n => n.id === selectedNft.id) + 1;
      const meta = {
        name: selectedNft.name,
        description: `A unique typographic robot NFT with ${selectedNft.trait} trait.`,
        attributes: [
          { trait_type: 'Trait', value: selectedNft.trait },
          { trait_type: 'Rarity', value: selectedNft.rarity },
          { trait_type: 'Power', value: selectedNft.power },
          { trait_type: 'Defense', value: selectedNft.defense },
          { trait_type: 'Speed', value: selectedNft.speed },
        ],
        id: selectedNft.id,
        created: selectedNft.created,
        robot_parts: { antenna: selectedNft.antenna, head: selectedNft.head, arms: selectedNft.arms, body: selectedNft.body, legs: selectedNft.legs },
        colors: { background: selectedNft.bgPalette, symbols: selectedNft.symbolColors }
      };
      const blob = new Blob([JSON.stringify(meta, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${nftIndex}.json`; a.click();
      URL.revokeObjectURL(url);
    }

    function downloadNFT(id) {
      const nft = nfts.find(n => n.id === id);
      if (!nft) return;
      const nftIndex = nfts.findIndex(n => n.id === id) + 1;
      const meta = {
        name: nft.name,
        description: `A unique typographic robot NFT with ${nft.trait} trait.`,
        attributes: [
          { trait_type: 'Trait', value: nft.trait },
          { trait_type: 'Rarity', value: nft.rarity },
          { trait_type: 'Power', value: nft.power },
          { trait_type: 'Defense', value: nft.defense },
          { trait_type: 'Speed', value: nft.speed },
        ],
        id: nft.id,
        created: nft.created,
        robot_parts: { antenna: nft.antenna, head: nft.head, arms: nft.arms, body: nft.body, legs: nft.legs },
        colors: { background: nft.bgPalette, symbols: nft.symbolColors }
      };
      const blob = new Blob([JSON.stringify(meta, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${nftIndex}.json`; a.click();
      URL.revokeObjectURL(url);
    }

    function downloadAllNFTs() {
      if (nfts.length === 0) return;
      nfts.forEach((nft, idx) => {
        const nftIndex = idx + 1;
        const meta = {
          name: nft.name,
          description: `A unique typographic robot NFT with ${nft.trait} trait.`,
          attributes: [
            { trait_type: 'Trait', value: nft.trait },
            { trait_type: 'Rarity', value: nft.rarity },
            { trait_type: 'Power', value: nft.power },
            { trait_type: 'Defense', value: nft.defense },
            { trait_type: 'Speed', value: nft.speed },
          ],
          id: nft.id,
          created: nft.created,
          robot_parts: { antenna: nft.antenna, head: nft.head, arms: nft.arms, body: nft.body, legs: nft.legs },
          colors: { background: nft.bgPalette, symbols: nft.symbolColors }
        };
        const blob = new Blob([JSON.stringify(meta, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${nftIndex}.json`; 
        setTimeout(() => a.click(), idx * 200);
        setTimeout(() => URL.revokeObjectURL(url), idx * 200 + 100);
      });
    }

    // Events
    document.getElementById('generate-btn').onclick = () => { nfts.push(generateRobot()); renderGrid(); };
    document.getElementById('generate-10-btn').onclick = () => { for(let i=0;i<10;i++) nfts.push(generateRobot()); renderGrid(); };
    document.getElementById('download-all-btn').onclick = downloadAllNFTs;
    document.getElementById('modal-close').onclick = () => document.getElementById('modal').classList.add('hidden');
    document.getElementById('modal').onclick = (e) => { if(e.target.id==='modal') document.getElementById('modal').classList.add('hidden'); };
    document.getElementById('download-btn').onclick = downloadJSON;

    // Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.getElementById('site-title').textContent = '⚙️ ' + (config.site_title || defaultConfig.site_title);
        document.body.style.backgroundColor = config.background_color || defaultConfig.background_color;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
          { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } },
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
      }),
      mapToEditPanelValues: (config) => new Map([
        ['site_title', config.site_title || defaultConfig.site_title]
      ])
    });

    lucide.createIcons();
  </script>
