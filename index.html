<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>V2 Dickbutts — NFT Builder (SVG + IPFS + GitHub)</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon: #7c3aed;
      --neon2: #a855f7;
      --neon3: #ec4899;
      --bg0: #05050f;
      --bg1: #0a0a1a;
      --bg2: #0f0f24;
      --text: #e2e0ff;
      --muted: #7070a0;
      --highlight: #c4b5fd;
      --border: rgba(124,58,237,0.18);
      --border2: rgba(124,58,237,0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg0);
      color: var(--text);
      overflow-x: hidden;
    }
    .font-raj { font-family: 'Rajdhani', sans-serif; }
    .font-orb { font-family: 'Orbitron', monospace; }

    #app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

    header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(5,5,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-text {
      font-family: 'Orbitron', monospace;
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(135deg, #a78bfa, #ec4899, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-pulse {
      display: inline-block;
      width: 8px; height: 8px;
      background: #a855f7;
      border-radius: 50%;
      margin-right: 10px;
      box-shadow: 0 0 0 0 rgba(168,85,247,0.7);
      animation: pulse-ring 2s ease infinite;
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(168,85,247,0.7); }
      70%  { box-shadow: 0 0 0 8px rgba(168,85,247,0); }
      100% { box-shadow: 0 0 0 0 rgba(168,85,247,0); }
    }

    .tabs-bar {
      display: flex;
      padding: 12px 16px;
      gap: 8px;
      background: rgba(5,5,15,0.7);
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 9px 18px;
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      transition: all 0.25s;
    }
    .tab-btn.active {
      color: #fff;
      border-color: var(--border2);
      background: rgba(124,58,237,0.15);
    }

    .panel { flex: 1; padding: 20px 16px; overflow: auto; }
    @media(min-width:640px){ .panel { padding: 24px 24px; } }

    .glass-card {
      background: rgba(18,18,42,0.7);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      padding: 20px;
    }

    .section-card {
      background: rgba(15,15,35,0.8);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .section-header:hover { background: rgba(124,58,237,0.08); }

    .section-content {
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }

    .section-badge {
      font-family: 'Rajdhani', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(124,58,237,0.2);
      color: #a78bfa;
    }

    .layer-item {
      border-radius: 8px;
      border: 1px solid rgba(124,58,237,0.15);
      cursor: pointer;
      padding: 8px;
      position: relative;
      background: rgba(37,99,235,0.08);
      transition: all 0.2s;
    }
    .layer-item:hover { border-color: var(--border2); transform: translateY(-2px); }
    .layer-item.selected { border-color: #a855f7; background: rgba(168,85,247,0.15); }
    
    .svg-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(234,179,8,0.8);
      color: #000;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-weight: bold;
      z-index: 3;
    }
    
    .order-number {
      position: absolute;
      top: -6px;
      left: -6px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      z-index: 2;
    }

    .nft-input, .svg-input {
      width: 100%;
      background: rgba(5,5,15,0.8);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text);
      outline: none;
    }
    .svg-input {
      font-family: 'Monaco', monospace;
      font-size: 12px;
      resize: vertical;
    }
    .nft-input:focus, .svg-input:focus { border-color: var(--neon2); }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid rgba(168,85,247,0.4);
      background: linear-gradient(135deg, rgba(124,58,237,0.8), rgba(168,85,247,0.6));
      color: #fff;
      transition: all 0.2s;
    }
    .btn-primary:hover { box-shadow: 0 0 30px rgba(168,85,247,0.5); }

    .btn-generate {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 24px;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899);
      color: #fff;
    }
    .btn-generate:hover { box-shadow: 0 0 40px rgba(168,85,247,0.6); }

    .btn-sm {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(20,20,40,0.8);
      color: var(--muted);
    }
    .btn-sm:hover { border-color: var(--border2); color: var(--text); }
    .btn-danger:hover { background: rgba(239,68,68,0.3); border-color: #ef4444; color: #fca5a5; }

    .preview-canvas {
      border: 1px solid var(--border2);
      border-radius: 10px;
      background: var(--bg0);
      display: block;
      margin: 0 auto;
    }

    .info-strip {
      background: rgba(124,58,237,0.06);
      border: 1px solid rgba(124,58,237,0.15);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
    }
    .info-strip span { color: var(--highlight); }

    .order-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 11px;
    }

    .mode-switch {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .mode-btn {
      padding: 6px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .mode-btn.active {
      background: rgba(124,58,237,0.2);
      border-color: var(--neon2);
      color: var(--highlight);
    }

    .gender-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .gender-label:has(input:checked) {
      border-color: var(--neon2);
      background: rgba(124,58,237,0.12);
    }
    .gender-label input { display: none; }

    .empty-state { text-align: center; padding: 64px 0; color: var(--muted); }
    .hidden { display: none; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,26,0.95);
      border: 1px solid var(--border2);
      color: var(--highlight);
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.hidden { display: none; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="logo-pulse"></span>
      <h1 class="logo-text">V2 DICKBUTTS</h1>
    </div>
    <span class="font-raj text-xs uppercase tracking-widest text-muted">SVG · IPFS · GitHub</span>
  </header>

  <div class="tabs-bar">
    <button onclick="App.switchTab('layers')" id="tab-layers" class="tab-btn active">🎨 Layers</button>
    <button onclick="App.switchTab('create')" id="tab-create" class="tab-btn">✨ Create NFT</button>
    <button onclick="App.switchTab('collection')" id="tab-collection" class="tab-btn">📦 Collection</button>
  </div>

  <div style="flex:1;overflow:auto">
    <div id="panel-layers" class="panel">
      <div class="glass-card">
        <div class="mode-switch">
          <div id="mode-url" class="mode-btn active" onclick="App.setMode('url')">🌐 Image URL</div>
          <div id="mode-svg" class="mode-btn" onclick="App.setMode('svg')">🎨 SVG Code</div>
        </div>
        
        <div id="url-mode">
          <div style="display:flex;flex-direction:column;gap:12px">
            <input type="text" id="image-url" placeholder="GitHub RAW / IPFS URL / Any image URL" class="nft-input">
            <div style="display:flex;gap:12px">
              <input type="text" id="url-value" placeholder="Value (e.g., Red Hair)" class="nft-input" style="flex:1">
              <select id="url-section" class="nft-input" style="flex:1">
                <option value="Background">Background</option><option value="Body">Body</option><option value="Butt">Butt</option>
                <option value="Dick">Dick</option><option value="Eyes">Eyes</option><option value="Hand">Hand</option>
                <option value="Hat">Hat</option><option value="Mouth">Mouth</option><option value="Nose">Nose</option>
                <option value="Shoes">Shoes</option><option value="Skin">Skin</option><option value="Special">Special</option>
              </select>
            </div>
            <button onclick="App.addLayerFromUrl()" class="btn-primary">➕ Add URL Layer</button>
          </div>
        </div>

        <div id="svg-mode" style="display:none">
          <div style="display:flex;flex-direction:column;gap:12px">
            <textarea id="svg-code" rows="5" class="svg-input" placeholder='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <circle cx="256" cy="256" r="200" fill="#7c3aed"/>
</svg>'></textarea>
            <div style="display:flex;gap:12px">
              <input type="text" id="svg-value" placeholder="Value" class="nft-input" style="flex:1">
              <select id="svg-section" class="nft-input" style="flex:1">
                <option value="Background">Background</option><option value="Body">Body</option><option value="Butt">Butt</option>
                <option value="Dick">Dick</option><option value="Eyes">Eyes</option><option value="Hand">Hand</option>
                <option value="Hat">Hat</option><option value="Mouth">Mouth</option><option value="Nose">Nose</option>
                <option value="Shoes">Shoes</option><option value="Skin">Skin</option><option value="Special">Special</option>
              </select>
            </div>
            <div style="display:flex;gap:16px">
              <label class="gender-label"><input type="radio" name="svg-gender" value="male" checked> ♂ Male</label>
              <label class="gender-label"><input type="radio" name="svg-gender" value="female"> ♀ Female</label>
            </div>
            <button onclick="App.addLayerFromSvg()" class="btn-primary">➕ Add SVG Layer</button>
          </div>
        </div>
      </div>

      <div class="info-strip mt-4">
        💡 <span>SVG Tip:</span> Use viewBox="0 0 512 512" for best results. SVG automatically converts to PNG.
      </div>

      <div id="sections-container" class="space-y-3 mt-4"></div>
      <p id="layers-empty" class="empty-state">No layers yet.<br>Add URL or SVG layers above.</p>
    </div>

    <div id="panel-create" class="panel hidden">
      <div class="glass-card">
        <canvas id="live-preview-canvas" width="512" height="512" class="preview-canvas" style="width:256px;height:256px"></canvas>
        <p class="font-raj text-center text-xs text-muted mt-3">⬆️ Live Preview (512x512)</p>
      </div>

      <div id="create-sections-container" class="space-y-3 mt-4"></div>

      <div class="glass-card mt-4">
        <p class="font-raj text-xs uppercase text-muted mb-2">Selected layers (bottom → top)</p>
        <div id="order-preview-list" style="display:flex;flex-wrap:wrap;gap:6px"></div>
      </div>

      <input type="text" id="nft-name" value="V2 Dickbutts" class="nft-input mt-4" placeholder="NFT Name">
      <textarea id="nft-description" rows="3" class="nft-input mt-4" placeholder="Description">crypto Dickbutts V2 — art community driven.</textarea>

      <button onclick="App.createNFT()" id="btn-create-nft" class="btn-generate mt-4">
        ✨ Generate NFT
      </button>
    </div>

    <div id="panel-collection" class="panel hidden">
      <div id="nft-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px"></div>
      <p id="nft-empty" class="empty-state">No NFTs created yet.</p>
    </div>
  </div>

  <div id="toast" class="hidden"></div>
</div>

<script>
let layersBySection = {
  "Background":[], "Body":[], "Butt":[], "Dick":[], "Eyes":[], "Hand":[],
  "Hat":[], "Mouth":[], "Nose":[], "Shoes":[], "Skin":[], "Special":[]
};
let selectedOrder = [];
let nfts = [];
let currentMode = 'url';
let previewCanvas = null, previewCtx = null;
let openSectionLayers = {};
let openSectionCreate = {};

const SECTIONS = ["Background","Body","Butt","Dick","Eyes","Hand","Hat","Mouth","Nose","Shoes","Skin","Special"];

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

function normalizeImageUrl(raw) {
  let url = raw.trim();
  if(!url) return '';
  if(url.includes('github.com') && url.includes('/blob/')) {
    url = url.replace('github.com','raw.githubusercontent.com').replace('/blob/','/');
  }
  if(url.includes('ipfs/') && !url.startsWith('http')) {
    url = 'https://ipfs.io/ipfs/' + url.split('ipfs/')[1];
  }
  if(url.startsWith('ipfs://')) {
    url = 'https://ipfs.io/ipfs/' + url.substring(7);
  }
  if(/^Qm[a-zA-Z0-9]{44,}\//.test(url)) {
    url = 'https://ipfs.io/ipfs/' + url;
  }
  return url;
}

function svgToDataUrl(svgString) {
  const blob = new Blob([svgString], { type: 'image/svg+xml' });
  return URL.createObjectURL(blob);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.remove('hidden');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => toast.classList.add('hidden'), 2500);
}

function saveToStorage() {
  localStorage.setItem('v2_layers', JSON.stringify(layersBySection));
  localStorage.setItem('v2_nfts', JSON.stringify(nfts));
}

function loadFromStorage() {
  try {
    const layers = localStorage.getItem('v2_layers');
    const nftsData = localStorage.getItem('v2_nfts');
    if(layers) layersBySection = JSON.parse(layers);
    if(nftsData) nfts = JSON.parse(nftsData);
    for(let sec of SECTIONS) if(!layersBySection[sec]) layersBySection[sec] = [];
  } catch(e) { console.warn(e); }
}

function renderImageToCanvas(ctx, img, w, h) {
  const imgW = img.width, imgH = img.height;
  const canvasAspect = w / h;
  const imgAspect = imgW / imgH;
  let dw, dh, dx = 0, dy = 0;
  if(imgAspect > canvasAspect) {
    dh = h;
    dw = imgW * (h / imgH);
    dx = (w - dw) / 2;
  } else {
    dw = w;
    dh = imgH * (w / imgW);
    dy = (h - dh) / 2;
  }
  ctx.drawImage(img, dx, dy, dw, dh);
}

async function updateLivePreview() {
  if(!previewCtx) return;
  previewCtx.clearRect(0, 0, 512, 512);
  previewCtx.fillStyle = '#05050f';
  previewCtx.fillRect(0, 0, 512, 512);
  for(let item of selectedOrder) {
    await new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = "Anonymous";
      img.onload = () => { renderImageToCanvas(previewCtx, img, 512, 512); resolve(); };
      img.onerror = () => resolve();
      img.src = item.imageUrl;
    });
  }
}

function addLayerFromUrl() {
  const url = document.getElementById('image-url').value.trim();
  const value = document.getElementById('url-value').value.trim();
  const section = document.getElementById('url-section').value;
  if(!url) { showToast('Enter image URL'); return; }
  if(!value) { showToast('Enter value'); return; }
  const finalUrl = normalizeImageUrl(url);
  const newLayer = { id: Date.now() + '_' + Math.random(), value, imageUrl: finalUrl, gender: 'male', type: 'url' };
  const img = new Image();
  img.onload = () => {
    layersBySection[section].push(newLayer);
    saveToStorage();
    renderSections();
    renderCreateSections();
    showToast(`✅ Added "${value}" to ${section}`);
    document.getElementById('image-url').value = '';
    document.getElementById('url-value').value = '';
  };
  img.onerror = () => showToast('❌ Failed to load image');
  img.src = finalUrl;
}

function addLayerFromSvg() {
  const svgCode = document.getElementById('svg-code').value.trim();
  const value = document.getElementById('svg-value').value.trim();
  const section = document.getElementById('svg-section').value;
  const radios = document.getElementsByName('svg-gender');
  let gender = 'male';
  for(let r of radios) if(r.checked) gender = r.value;
  
  if(!svgCode) { showToast('Enter SVG code'); return; }
  if(!value) { showToast('Enter value'); return; }
  
  let finalSvg = svgCode;
  if(!svgCode.includes('viewBox')) {
    finalSvg = svgCode.replace('<svg', '<svg viewBox="0 0 512 512"');
  }
  if(!finalSvg.includes('width="512"')) {
    finalSvg = finalSvg.replace('<svg', '<svg width="512" height="512"');
  }
  
  const svgDataUrl = svgToDataUrl(finalSvg);
  const newLayer = { id: Date.now() + '_' + Math.random(), value, imageUrl: svgDataUrl, gender, type: 'svg', svgRaw: finalSvg };
  const img = new Image();
  img.onload = () => {
    layersBySection[section].push(newLayer);
    saveToStorage();
    renderSections();
    renderCreateSections();
    showToast(`✅ Added SVG "${value}" to ${section}`);
    document.getElementById('svg-code').value = '';
    document.getElementById('svg-value').value = '';
  };
  img.onerror = () => { showToast('❌ Invalid SVG code'); URL.revokeObjectURL(svgDataUrl); };
  img.src = svgDataUrl;
}

function deleteLayer(section, layerId) {
  if(confirm('Delete this layer?')) {
    const layer = layersBySection[section].find(l => String(l.id) === String(layerId));
    if(layer && layer.type === 'svg' && layer.imageUrl && layer.imageUrl.startsWith('blob:')) {
      URL.revokeObjectURL(layer.imageUrl);
    }
    layersBySection[section] = layersBySection[section].filter(l => String(l.id) !== String(layerId));
    selectedOrder = selectedOrder.filter(item => String(item.layerId) !== String(layerId));
    selectedOrder.forEach((item, idx) => item.order = idx + 1);
    saveToStorage();
    renderSections();
    renderCreateSections();
    updateOrderPreview();
    updateLivePreview();
    showToast('Layer deleted');
  }
}

function toggleSectionLayers(section) {
  openSectionLayers[section] = !openSectionLayers[section];
  renderSections();
}

function toggleSectionCreate(section) {
  openSectionCreate[section] = !openSectionCreate[section];
  renderCreateSections();
}

function renderSections() {
  const container = document.getElementById('sections-container');
  const empty = document.getElementById('layers-empty');
  let hasAny = false;
  let html = '';
  
  for(let section of SECTIONS) {
    const layers = layersBySection[section] || [];
    if(layers.length > 0) hasAny = true;
    const isOpen = openSectionLayers[section] === true;
    
    html += `
      <div class="section-card fade-in">
        <div onclick="App.toggleSectionLayers('${section}')" class="section-header">
          <div style="display:flex;align-items:center;gap:10px">
            <span class="font-raj font-bold" style="color:#c4b5fd">${section}</span>
            <span class="text-xs text-muted">${layers.length} layers</span>
            <span class="section-badge">${section === 'Background' ? 'UI Only' : 'Trait'}</span>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform:${isOpen ? 'rotate(180deg)' : 'rotate(0deg)'}; transition:transform 0.25s">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
        ${isOpen ? `<div class="section-content">
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-top:14px">
            ${layers.map(layer => `
              <div class="layer-item ${layer.gender === 'male' ? 'male-bg' : 'female-bg'}">
                ${layer.type === 'svg' ? '<div class="svg-badge">SVG</div>' : ''}
                <div style="aspect-ratio:1;border-radius:6px;overflow:hidden;background:var(--bg0);margin-bottom:8px">
                  <img src="${layer.imageUrl}" style="width:100%;height:100%;object-fit:cover" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22%3E%3Crect fill=%22%23111%22 width=%2260%22 height=%2260%22/%3E%3C/svg%3E'">
                </div>
                <p style="font-size:11px;font-weight:600;text-align:center;color:var(--text)">${escapeHtml(layer.value)}</p>
                <button onclick="event.stopPropagation(); App.deleteLayer('${section}', '${layer.id}')" class="btn-sm btn-danger" style="width:100%;margin-top:8px">Delete</button>
              </div>
            `).join('')}
          </div>
        </div>` : ''}
      </div>
    `;
  }
  
  empty.classList.toggle('hidden', hasAny);
  container.innerHTML = html;
}

function renderCreateSections() {
  const container = document.getElementById('create-sections-container');
  if(!container) return;
  let html = '';
  let hasAny = false;
  
  for(let section of SECTIONS) {
    const layers = layersBySection[section] || [];
    if(layers.length === 0) continue;
    hasAny = true;
    const isOpen = openSectionCreate[section] === true;
    const selectedItem = selectedOrder.find(item => item.section === section);
    const selectedId = selectedItem ? selectedItem.layerId : null;
    
    html += `
      <div class="section-card fade-in">
        <div onclick="App.toggleSectionCreate('${section}')" class="section-header">
          <div style="display:flex;align-items:center;gap:10px">
            <span class="font-raj font-bold" style="color:#c4b5fd">${section}</span>
            <span class="text-xs text-muted">${layers.length} layers</span>
            ${selectedItem ? `<span class="text-xs" style="color:#34d399">✓ ORDER ${selectedItem.order}</span>` : ''}
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform:${isOpen ? 'rotate(180deg)' : 'rotate(0deg)'}; transition:transform 0.25s">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
        ${isOpen ? `<div class="section-content">
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:14px">
            ${layers.map(layer => {
              const isSel = String(selectedId) === String(layer.id);
              const orderNum = isSel ? selectedOrder.find(item => String(item.layerId) === String(layer.id))?.order : null;
              return `
                <div onclick="App.selectLayer('${section}','${layer.id}','${escapeHtml(layer.value).replace(/'/g, "\\'")}','${layer.imageUrl.replace(/'/g, "\\'")}','${layer.gender}')"
                     class="layer-item ${isSel ? 'selected' : ''}" style="cursor:pointer">
                  ${isSel && orderNum ? `<div class="order-number">${orderNum}</div>` : ''}
                  ${layer.type === 'svg' ? '<div class="svg-badge">SVG</div>' : ''}
                  <div style="aspect-ratio:1;border-radius:6px;overflow:hidden;background:var(--bg0);margin-bottom:6px">
                    <img src="${layer.imageUrl}" style="width:100%;height:100%;object-fit:cover">
                  </div>
                  <p style="font-size:10px;font-weight:600;text-align:center;color:var(--text)">${escapeHtml(layer.value)}</p>
                </div>
              `;
            }).join('')}
          </div>
        </div>` : ''}
      </div>
    `;
  }
  
  if(!hasAny) {
    container.innerHTML = '<div class="empty-state">No layers added yet.<br>Go to Layers tab and add layers.</div>';
  } else {
    container.innerHTML = html;
  }
  updateOrderPreview();
}

function selectLayer(section, layerId, value, imageUrl, gender) {
  const existingIndex = selectedOrder.findIndex(item => item.section === section);
  if(existingIndex !== -1) {
    selectedOrder.splice(existingIndex, 1);
    selectedOrder.forEach((item, idx) => item.order = idx + 1);
  } else {
    selectedOrder.push({ section, layerId, value, imageUrl, gender, order: selectedOrder.length + 1 });
  }
  renderCreateSections();
  updateLivePreview();
}

function updateOrderPreview() {
  const div = document.getElementById('order-preview-list');
  if(!div) return;
  if(selectedOrder.length === 0) {
    div.innerHTML = '<span class="text-muted text-xs">No layers selected</span>';
    return;
  }
  div.innerHTML = selectedOrder.map(item => `
    <span class="order-tag">
      <span style="color:#a855f7;font-weight:800">${item.order}</span>
      ${item.section === 'Background' ? 'BG' : item.section}: ${escapeHtml(item.value)}
    </span>
  `).join('');
}

async function compositeFromSelected() {
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#05050f';
  ctx.fillRect(0, 0, 512, 512);
  for(let item of selectedOrder) {
    await new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "Anonymous";
      img.onload = () => { renderImageToCanvas(ctx, img, 512, 512); resolve(); };
      img.onerror = () => reject(new Error(`Failed to load ${item.section}`));
      img.src = item.imageUrl;
    });
  }
  return canvas.toDataURL('image/png');
}

async function createNFT() {
  if(selectedOrder.length === 0) { showToast('Select at least one layer'); return; }
  const name = document.getElementById('nft-name').value.trim() || "V2 Dickbutts";
  const description = document.getElementById('nft-description').value.trim();
  const btn = document.getElementById('btn-create-nft');
  btn.disabled = true;
  btn.innerHTML = '<div class="animate-spin" style="width:18px;height:18px;border:2px solid white;border-top-color:transparent;border-radius:50%"></div> Generating...';
  try {
    const imageData = await compositeFromSelected();
    const attributes = selectedOrder.filter(item => item.section !== "Background")
      .map(item => ({ trait_type: item.section, value: item.value }));
    attributes.push({ trait_type: "Attribute Count", value: attributes.length.toString() });
    nfts.push({ id: Date.now() + '_' + Math.random().toString(36).substr(2, 6), name, description, image: imageData, attributes });
    saveToStorage();
    selectedOrder = [];
    renderCreateSections();
    renderCollection();
    updateLivePreview();
    showToast(`✅ "${name}" created!`);
    switchTab('collection');
  } catch(err) { showToast(`Error: ${err.message}`); }
  finally { btn.disabled = false; btn.innerHTML = '✨ Generate NFT'; }
}

function renderCollection() {
  const container = document.getElementById('nft-list');
  const empty = document.getElementById('nft-empty');
  if(!container) return;
  empty.classList.toggle('hidden', nfts.length > 0);
  if(nfts.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = nfts.map(nft => `
    <div class="section-card fade-in" onclick="App.viewMetadata('${nft.id}')" style="cursor:pointer">
      <div style="aspect-ratio:1;background:var(--bg0);overflow:hidden">
        <img src="${nft.image}" style="width:100%;height:100%;object-fit:contain">
      </div>
      <div style="padding:14px">
        <h3 class="font-raj font-bold">${escapeHtml(nft.name)}</h3>
        <p class="text-muted text-xs mt-1">${nft.attributes.length - 1} traits</p>
        <div style="display:flex;gap:8px;margin-top:12px" onclick="event.stopPropagation()">
          <button onclick="App.downloadImage('${nft.id}')" class="btn-sm">📷 Image</button>
          <button onclick="App.downloadJSON('${nft.id}')" class="btn-sm">📄 JSON</button>
          <button onclick="App.deleteNFT('${nft.id}')" class="btn-sm btn-danger">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

function viewMetadata(id) {
  const nft = nfts.find(n => n.id == id);
  if(!nft) return;
  alert(`Name: ${nft.name}\nDescription: ${nft.description}\nTraits: ${nft.attributes.map(a => `${a.trait_type}: ${a.value}`).join('\n')}`);
}

function downloadJSON(id) {
  const nft = nfts.find(n => n.id == id);
  const metadata = { name: nft.name, description: nft.description, image: "ipfs://placeholder", attributes: nft.attributes };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(metadata, null, 2)], { type: 'application/json' }));
  a.download = `${nft.name.replace(/[^a-z0-9]/gi, '_')}.json`;
  a.click();
  showToast('JSON downloaded');
}

function downloadImage(id) {
  const nft = nfts.find(n => n.id == id);
  const a = document.createElement('a');
  a.href = nft.image;
  a.download = `${nft.name.replace(/[^a-z0-9]/gi, '_')}.png`;
  a.click();
  showToast('Image downloaded');
}

function deleteNFT(id) {
  if(confirm('Delete this NFT?')) {
    nfts = nfts.filter(n => n.id != id);
    saveToStorage();
    renderCollection();
    showToast('NFT deleted');
  }
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-url').classList.toggle('active', mode === 'url');
  document.getElementById('mode-svg').classList.toggle('active', mode === 'svg');
  document.getElementById('url-mode').style.display = mode === 'url' ? 'block' : 'none';
  document.getElementById('svg-mode').style.display = mode === 'svg' ? 'block' : 'none';
}

function switchTab(tab) {
  document.getElementById('panel-layers').classList.toggle('hidden', tab !== 'layers');
  document.getElementById('panel-create').classList.toggle('hidden', tab !== 'create');
  document.getElementById('panel-collection').classList.toggle('hidden', tab !== 'collection');
  document.getElementById('tab-layers').classList.toggle('active', tab === 'layers');
  document.getElementById('tab-create').classList.toggle('active', tab === 'create');
  document.getElementById('tab-collection').classList.toggle('active', tab === 'collection');
  if(tab === 'create') {
    if(!previewCanvas) {
      previewCanvas = document.getElementById('live-preview-canvas');
      previewCtx = previewCanvas.getContext('2d');
    }
    updateLivePreview();
  }
  if(tab === 'collection') renderCollection();
}

function init() {
  loadFromStorage();
  previewCanvas = document.getElementById('live-preview-canvas');
  if(previewCanvas) previewCtx = previewCanvas.getContext('2d');
  renderSections();
  renderCreateSections();
  renderCollection();
  setMode('url');
}

window.App = {
  switchTab, setMode, addLayerFromUrl, addLayerFromSvg, deleteLayer,
  toggleSectionLayers, toggleSectionCreate, selectLayer, createNFT,
  viewMetadata, downloadJSON, downloadImage, deleteNFT
};

init();
</script>
</body>
</html>
