<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Robo Symbol NFT Generator — Cyberpunk Robot Collection Forge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
    #nft-app { font-family: 'Share Tech Mono', monospace; background: #050510; min-height: 500px; padding: 16px; border-radius: 8px; color: #e0e0ff; }
    .orbitron { font-family: 'Orbitron', monospace; }
    .ctrl-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; align-items: center; }
    .neon-btn { font-family: 'Share Tech Mono', monospace; background: transparent; border: 1px solid; padding: 6px 14px; font-size: 13px; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; border-radius: 3px; }
    .btn-green { border-color: #00ff88; color: #00ff88; }
    .btn-green:hover { background: #00ff8822; box-shadow: 0 0 10px #00ff8866; }
    .btn-cyan { border-color: #00ccff; color: #00ccff; }
    .btn-cyan:hover { background: #00ccff22; box-shadow: 0 0 10px #00ccff66; }
    .btn-magenta { border-color: #ff00cc; color: #ff00cc; }
    .btn-magenta:hover { background: #ff00cc22; box-shadow: 0 0 10px #ff00cc66; }
    .btn-yellow { border-color: #ffcc00; color: #ffcc00; }
    .btn-yellow:hover { background: #ffcc0022; box-shadow: 0 0 10px #ffcc0066; }
    .count-label { font-size: 12px; color: #8888aa; margin-left: 4px; }
    .nft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .nft-card { background: #0a0a1e; border: 1px solid #1a1a3a; border-radius: 4px; padding: 6px; cursor: pointer; transition: all 0.15s; }
    .nft-card:hover { border-color: #00ccff55; box-shadow: 0 0 12px #00ccff33; transform: translateY(-2px); }
    .nft-canvas-wrap { width: 100%; aspect-ratio: 1; overflow: hidden; border-radius: 3px; }
    .nft-canvas-wrap canvas { width: 100%; height: 100%; display: block; }
    .nft-label { font-size: 10px; color: #8888cc; text-align: center; margin-top: 4px; letter-spacing: 0.5px; }
    .rarity-badge { font-size: 9px; text-align: center; padding: 2px 0; border-radius: 2px; letter-spacing: 1px; margin-top: 2px; }
    .dl-row { display: flex; gap: 4px; margin-top: 5px; }
    .dl-row button { flex: 1; font-family: 'Share Tech Mono', monospace; background: transparent; border: 1px solid #222244; border-radius: 2px; font-size: 9px; color: #8888cc; cursor: pointer; padding: 3px 2px; transition: all 0.1s; letter-spacing: 0.5px; }
    .dl-row button:hover { border-color: #00ccff88; color: #00ccff; }
    .empty-msg { text-align: center; color: #333366; font-size: 14px; padding: 40px 0; letter-spacing: 2px; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .modal-box { background: #070714; border: 1px solid #00ccff55; border-radius: 6px; padding: 20px; max-width: 340px; width: 90%; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-title { font-family: 'Orbitron', monospace; font-size: 14px; color: #00ccff; margin-bottom: 12px; letter-spacing: 2px; }
    .modal-canvas-wrap { width: 100%; aspect-ratio: 1; margin-bottom: 12px; border-radius: 4px; overflow: hidden; }
    .modal-canvas-wrap canvas { width: 100%; height: 100%; display: block; }
    .meta-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-bottom: 12px; }
    .meta-table td { padding: 4px 6px; border-bottom: 1px solid #111133; }
    .meta-table td:first-child { color: #666699; }
    .meta-table td:last-child { color: #ccccff; text-align: right; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns button { flex: 1; font-family: 'Share Tech Mono', monospace; border-radius: 3px; background: transparent; border: 1px solid; cursor: pointer; padding: 8px; font-size: 12px; letter-spacing: 1px; transition: all 0.15s; }
    .modal-close-btn { position: absolute; top: 12px; right: 14px; background: transparent; border: none; color: #666699; font-size: 18px; cursor: pointer; }
    .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0a0a2a; border: 1px solid #00ccff; color: #00ccff; padding: 6px 14px; border-radius: 30px; font-family: 'Share Tech Mono', monospace; font-size: 11px; z-index: 1000; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  </style>
</head>
<body style="margin:0; background:#0a0a1a;">
<div id="nft-app">
  <h2 class="sr-only" style="position:absolute; left:-10000px;">Robo Symbol NFT Generator — create and download cyberpunk robot NFTs</h2>
  <div style="margin-bottom:14px;">
    <div class="orbitron" style="font-size:16px; color:#00ccff; letter-spacing:3px; text-shadow:0 0 20px #00ccff88;">⬡ ROBO SYMBOL NFT GEN</div>
    <div style="font-size:10px; color:#333366; letter-spacing:4px; margin-top:2px;">CYBERPUNK ROBOT COLLECTION FORGE</div>
  </div>
  <div class="ctrl-bar">
    <button class="neon-btn btn-green" id="gen1">⊕ GENERATE</button>
    <button class="neon-btn btn-cyan" id="gen10">⚡ MINT × 10</button>
    <button class="neon-btn btn-magenta" id="dlAll">↓ EXPORT ALL</button>
    <span class="count-label" id="countLbl">COLLECTION: 0</span>
  </div>
  <div id="nft-grid" class="nft-grid"></div>
  <div id="empty-msg" class="empty-msg">[ CLICK GENERATE TO MINT YOUR FIRST ROBOT ]</div>
</div>

<div id="modal-bg" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <button class="modal-close-btn" id="modal-close">✕</button>
    <div class="modal-title" id="modal-name">ROBOT #0</div>
    <div class="modal-canvas-wrap"><canvas id="modal-canvas" width="512" height="512"></canvas></div>
    <table class="meta-table" id="modal-meta"></table>
    <div class="modal-btns">
      <button id="modal-dl-png" class="btn-cyan" style="border-color:#00ccff; color:#00ccff;">↓ PNG</button>
      <button id="modal-dl-json" class="btn-green" style="border-color:#00ff88; color:#00ff88;">↓ JSON</button>
    </div>
  </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
(function(){
  const RARITIES = ['COMMON','UNCOMMON','RARE','EPIC','LEGENDARY'];
  const RARITY_COLORS = {'COMMON':'#888899','UNCOMMON':'#00cc66','RARE':'#0099ff','EPIC':'#cc44ff','LEGENDARY':'#ffaa00'};
  const TRAITS = ['HACKER','MYSTIC','WARRIOR','VOID','SAMURAI','SCIENTIST','GUARDIAN','ROGUE','AI_PRIEST','BUILDER'];
  const SYMBOLS = {
    intel: ['π','∫','∑','∆','∇','λ','Ω','Φ','Ψ','∞'],
    power: ['⊕','⊗','⊞','⊠','◈','◉','⊡','⊟','⊛','⊜'],
    control: ['⌘','⌥','⌦','⌫','⎋','⏎','⇧','⌃','⌤','⍟'],
    data: ['☰','☷','☵','☳','☴','☱','☲','☶','⊣','⊢'],
    misc: ['◆','◇','▲','▼','◀','▶','■','□','●','○']
  };
  const PALETTES = [
    {bg:['#020212','#040824','#060520'],a:'#00ff88',b:'#00ccff',c:'#8800ff'},
    {bg:['#120208','#240408','#200506'],a:'#ff0066',b:'#ff6600',c:'#ffcc00'},
    {bg:['#020c12','#020f1e','#041224'],a:'#00eeff',b:'#0088ff',c:'#00ff44'},
    {bg:['#0c0212','#180224','#14061e'],a:'#ff00ff',b:'#cc00ff',c:'#ff4499'},
    {bg:['#0a0a02','#141202','#181600'],a:'#ffff00',b:'#ccff00',c:'#ff9900'},
    {bg:['#020808','#031212','#041616'],a:'#00ffcc',b:'#00ff88',c:'#00ccff'},
    {bg:['#080012','#100020','#0c0018'],a:'#8844ff',b:'#aa00ff',c:'#ff44cc'},
  ];

  let nfts = [];
  let selectedNft = null;
  let pendingDownloads = 0;      // track concurrent downloads to avoid browser conflicts
  let downloadQueue = [];        // queue for export all
  let isExportingAll = false;

  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5)+Math.random().toString(36).slice(2,5); }

  function showToast(msg, duration = 1800){
    const toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, duration);
  }

  function genNft(idx){
    const pal = pick(PALETTES);
    const r = Math.random();
    const rarity = r<0.45?'COMMON':r<0.72?'UNCOMMON':r<0.88?'RARE':r<0.97?'EPIC':'LEGENDARY';
    return {
      id: uid(), idx: idx+1,
      palette: pal,
      rarity, trait: pick(TRAITS),
      power: rnd(10,99), defense: rnd(10,99), speed: rnd(10,99),
      antenna_sym: pick(SYMBOLS.intel),
      eye_l: pick(SYMBOLS.power), eye_r: pick(SYMBOLS.power),
      mouth: pick(SYMBOLS.control),
      shoulder_l: pick(SYMBOLS.data), shoulder_r: pick(SYMBOLS.data),
      chest: pick(SYMBOLS.intel),
      core: pick(SYMBOLS.misc),
      arm_l: pick(SYMBOLS.data), arm_r: pick(SYMBOLS.data),
      hand_l: pick(SYMBOLS.control), hand_r: pick(SYMBOLS.control),
      hip_l: pick(SYMBOLS.misc), hip_r: pick(SYMBOLS.misc),
      knee_l: pick(SYMBOLS.power), knee_r: pick(SYMBOLS.power),
      foot_l: pick(SYMBOLS.data), foot_r: pick(SYMBOLS.data),
      circuit1: pick(SYMBOLS.misc), circuit2: pick(SYMBOLS.intel),
      created: new Date().toISOString()
    };
  }

  // Helper for rounded rect
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      this.moveTo(x+r, y);
      this.lineTo(x+w-r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r);
      this.quadraticCurveTo(x, y, x+r, y);
      return this;
    };
  }

  function drawRobot(canvas, nft, glowStrength){
    const W=512, H=512;
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d');
    const pal=nft.palette;
    const a=pal.a, b=pal.b, c=pal.c;
    const glow = glowStrength || 18;

    // Background gradient
    const bgGrad = ctx.createLinearGradient(0,0,W,H);
    bgGrad.addColorStop(0, pal.bg[0]);
    bgGrad.addColorStop(0.5, pal.bg[1]);
    bgGrad.addColorStop(1, pal.bg[2]);
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0,0,W,H);

    // Grid floor pattern
    ctx.strokeStyle = a+'18';
    ctx.lineWidth = 0.5;
    for(let i=0;i<W;i+=24){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
    for(let j=0;j<H;j+=24){ ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(W,j); ctx.stroke(); }

    // Scanlines
    for(let y=0;y<H;y+=4){
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(0,y,W,2);
    }

    // Corner circuit decorations
    function drawCornerCircuit(x,y,flip,col){
      ctx.strokeStyle=col+'66';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.save(); ctx.translate(x,y); ctx.scale(flip?-1:1,1);
      ctx.moveTo(0,0); ctx.lineTo(40,0); ctx.lineTo(40,20); ctx.lineTo(60,20);
      ctx.moveTo(0,10); ctx.lineTo(20,10); ctx.lineTo(20,40);
      ctx.stroke(); ctx.restore();
    }
    drawCornerCircuit(10,10,1,a);
    drawCornerCircuit(W-10,10,-1,b);
    drawCornerCircuit(10,H-10,1,c);
    drawCornerCircuit(W-10,H-10,-1,a);

    function glowText(text, x, y, col, size, glowW){
      ctx.save();
      ctx.font = `bold ${size}px 'Share Tech Mono', monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor=col; ctx.shadowBlur=glowW||glow;
      ctx.fillStyle=col; ctx.fillText(text,x,y);
      ctx.shadowBlur=0; ctx.restore();
    }

    function glowRect(x,y,w,h,col,rad){
      ctx.save();
      ctx.shadowColor=col; ctx.shadowBlur=glow;
      ctx.strokeStyle=col; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.roundRect(x,y,w,h,rad||3);
      ctx.stroke();
      ctx.fillStyle=col+'18';
      ctx.fill();
      ctx.restore();
    }

    const cx=W/2;

    // Dimensions
    const headW=120, headH=80;
    const headX=cx-headW/2, headY=95;
    const bodyW=130, bodyH=120;
    const bodyX=cx-bodyW/2, bodyY=headY+headH+16;
    const shoulderW=30, shoulderH=30;
    const armW=26, armH=80;
    const handW=24, handH=24;
    const hipW=44, hipH=22;
    const legW=32, legH=70;
    const footW=38, footH=18;
    const armGap=14;

    const shlLX=bodyX-shoulderW-6, shlLY=bodyY+6;
    const shlRX=bodyX+bodyW+6, shlRY=bodyY+6;
    const armLX=cx-bodyW/2-armW-8, armLY=shlLY+shoulderH+4;
    const armRX=cx+bodyW/2+8, armRY=shlRY+shoulderH+4;
    const handLX=armLX+1, handLY=armLY+armH+4;
    const handRX=armRX+1, handRY=armRY+armH+4;
    const hipLX=cx-hipW-2, hipRX=cx+2, hipY=bodyY+bodyH+8;
    const legLX=cx-hipW+4, legLY=hipY+hipH+4;
    const legRX=cx+hipW/2-legW/2+8, legRY=hipY+hipH+4;
    const footLX=legLX-3, footLY=legLY+legH+4;
    const footRX=legRX-3, footRY=legRY+legH+4;

    // Antenna
    ctx.save();
    ctx.strokeStyle=a; ctx.lineWidth=2; ctx.shadowColor=a; ctx.shadowBlur=glow;
    ctx.beginPath(); ctx.moveTo(cx,headY); ctx.lineTo(cx,headY-30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-20,headY-15); ctx.lineTo(cx,headY-30); ctx.lineTo(cx+20,headY-15); ctx.stroke();
    ctx.restore();
    glowText(nft.antenna_sym, cx, headY-38, a, 20, glow);
    ctx.save(); ctx.shadowColor=a; ctx.shadowBlur=glow*1.5;
    ctx.fillStyle=a; ctx.beginPath(); ctx.arc(cx, headY-30, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // Head
    glowRect(headX, headY, headW, headH, b, 4);
    const eyeY=headY+headH/2-8;
    glowRect(headX+16, eyeY, 36, 26, a, 3);
    glowRect(headX+headW-52, eyeY, 36, 26, a, 3);
    glowText(nft.eye_l, headX+34, eyeY+13, a, 18, glow*1.2);
    glowText(nft.eye_r, headX+headW-34, eyeY+13, a, 18, glow*1.2);
    ctx.save(); ctx.strokeStyle=b+'44'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(headX+14,eyeY-2); ctx.lineTo(headX+headW-14,eyeY-2); ctx.stroke();
    ctx.restore();
    glowText(nft.mouth, cx, headY+headH-14, c, 16, glow);

    // Shoulders
    glowRect(shlLX, shlLY, shoulderW, shoulderH, c, 3);
    glowRect(shlRX, shlRY, shoulderW, shoulderH, c, 3);
    glowText(nft.shoulder_l, shlLX+shoulderW/2, shlLY+shoulderH/2, c, 14);
    glowText(nft.shoulder_r, shlRX+shoulderW/2, shlRY+shoulderH/2, c, 14);

    // Arms
    glowRect(armLX, armLY, armW, armH, b, 3);
    glowRect(armRX, armRY, armW, armH, b, 3);
    for(let i=1;i<=3;i++){
      const ay=armLY+armH*(i/4);
      ctx.save(); ctx.strokeStyle=b+'55'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(armLX+3,ay); ctx.lineTo(armLX+armW-3,ay); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(armRX+3,ay); ctx.lineTo(armRX+armW-3,ay); ctx.stroke();
      ctx.restore();
    }
    glowText(nft.arm_l, armLX+armW/2, armLY+armH/2, b, 14);
    glowText(nft.arm_r, armRX+armW/2, armRY+armH/2, b, 14);

    // Hands
    glowRect(handLX, handLY, handW, handH, a, 3);
    glowRect(handRX, handRY, handW, handH, a, 3);
    glowText(nft.hand_l, handLX+handW/2, handLY+handH/2, a, 12);
    glowText(nft.hand_r, handRX+handW/2, handRY+handH/2, a, 12);

    // Body
    glowRect(bodyX, bodyY, bodyW, bodyH, b, 4);
    glowRect(bodyX+bodyW/2-22, bodyY+14, 44, 38, a, 3);
    glowText(nft.chest, cx, bodyY+14+19, a, 22, glow*1.5);
    glowText(nft.core, cx, bodyY+bodyH-24, c, 18, glow);
    ctx.save(); ctx.strokeStyle=b+'40'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(bodyX+10,bodyY+64); ctx.lineTo(bodyX+bodyW/2-26,bodyY+64); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bodyX+bodyW-10,bodyY+64); ctx.lineTo(bodyX+bodyW/2+26,bodyY+64); ctx.stroke();
    ctx.restore();
    glowText(nft.circuit1, bodyX+22, bodyY+70, c, 12, 8);
    glowText(nft.circuit2, bodyX+bodyW-22, bodyY+70, c, 12, 8);

    ctx.save(); ctx.strokeStyle=c+'66'; ctx.lineWidth=2; ctx.shadowColor=c; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(shlLX+shoulderW, shlLY+shoulderH/2); ctx.lineTo(bodyX, shlLY+shoulderH/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(shlRX, shlRY+shoulderH/2); ctx.lineTo(bodyX+bodyW, shlRY+shoulderH/2); ctx.stroke();
    ctx.restore();

    // Hips
    glowRect(hipLX, hipY, hipW, hipH, c, 3);
    glowRect(hipRX, hipY, hipW, hipH, c, 3);
    glowText(nft.hip_l, hipLX+hipW/2, hipY+hipH/2, c, 13);
    glowText(nft.hip_r, hipRX+hipW/2, hipY+hipH/2, c, 13);

    // Legs
    glowRect(legLX, legLY, legW, legH, b, 3);
    glowRect(legRX, legRY, legW, legH, b, 3);
    glowRect(legLX+1, legLY+legH/2-12, legW-2, 24, a, 3);
    glowRect(legRX+1, legRY+legH/2-12, legW-2, 24, a, 3);
    glowText(nft.knee_l, legLX+legW/2, legLY+legH/2, a, 13);
    glowText(nft.knee_r, legRX+legW/2, legRY+legH/2, a, 13);

    // Feet
    glowRect(footLX, footLY, footW, footH, c, 3);
    glowRect(footRX, footRY, footW, footH, c, 3);
    glowText(nft.foot_l, footLX+footW/2, footLY+footH/2, c, 12);
    glowText(nft.foot_r, footRX+footW/2, footRY+footH/2, c, 12);

    // Rarity glow ring
    const rcol = RARITY_COLORS[nft.rarity];
    ctx.save(); ctx.strokeStyle=rcol; ctx.lineWidth=2; ctx.shadowColor=rcol; ctx.shadowBlur=glow;
    ctx.strokeRect(4,4,W-8,H-8);
    ctx.restore();
    glowText('◆', 18, 18, rcol, 12, 10);
    glowText('◆', W-18, 18, rcol, 12, 10);
    glowText('◆', 18, H-18, rcol, 12, 10);
    glowText('◆', W-18, H-18, rcol, 12, 10);
  }

  // generate fresh canvas for each download to avoid blob conflicts & ensure no caching
  async function prepareCanvasBlob(nft, glowVal = 18) {
    const canvas = document.createElement('canvas');
    drawRobot(canvas, nft, glowVal);
    return new Promise((resolve) => {
      canvas.toBlob(blob => resolve(blob), 'image/png');
    });
  }

  async function dlPng(id, silent = false){
    const nft = nfts.find(n=>n.id===id);
    if(!nft) return;
    try {
      const blob = await prepareCanvasBlob(nft, 18);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `RoboSym_${nft.idx}_${nft.trait}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      if (!silent) showToast(`✓ PNG saved: ${nft.trait} #${nft.idx}`, 1200);
    } catch(e) { console.warn(e); if(!silent) showToast(`⚠️ PNG failed`, 1000); }
  }

  function dlJson(id, silent = false){
    const nft = nfts.find(n=>n.id===id);
    if(!nft) return;
    try {
      const meta = {
        name: `RoboSym #${nft.idx}`,
        description: `Cyberpunk robot NFT with ${nft.trait} trait.`,
        image: `RoboSym_${nft.idx}_${nft.trait}.png`,
        attributes: [
          {trait_type:'Trait', value:nft.trait},
          {trait_type:'Rarity', value:nft.rarity},
          {trait_type:'Power', value:nft.power},
          {trait_type:'Defense', value:nft.defense},
          {trait_type:'Speed', value:nft.speed},
        ],
        id: nft.id, created: nft.created,
        palette: {background:nft.palette.bg, colors:[nft.palette.a,nft.palette.b,nft.palette.c]}
      };
      const blob = new Blob([JSON.stringify(meta, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `RoboSym_${nft.idx}_${nft.trait}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      if (!silent) showToast(`✓ JSON saved: ${nft.trait} #${nft.idx}`, 1200);
    } catch(e) { if(!silent) showToast(`⚠️ JSON error`, 1000); }
  }

  // improved export all with sequential queue + delay to prevent browser blocking
  function exportAll() {
    if (nfts.length === 0) {
      showToast("No NFTs to export", 1500);
      return;
    }
    if (isExportingAll) {
      showToast("Export already in progress...", 1000);
      return;
    }
    isExportingAll = true;
    const exportList = [];
    for (let i = 0; i < nfts.length; i++) {
      exportList.push({ type: 'png', id: nfts[i].id });
      exportList.push({ type: 'json', id: nfts[i].id });
    }
    let idx = 0;
    function processNext() {
      if (idx >= exportList.length) {
        isExportingAll = false;
        showToast(`✅ Exported ${nfts.length} NFTs (PNG + JSON)`, 2500);
        return;
      }
      const item = exportList[idx];
      idx++;
      if (item.type === 'png') {
        dlPng(item.id, true);
      } else {
        dlJson(item.id, true);
      }
      // delay between each file to avoid browser download conflicts & popup block
      setTimeout(processNext, 280);
    }
    processNext();
  }

  function addNftCard(nft){
    const grid = document.getElementById('nft-grid');
    document.getElementById('empty-msg').style.display='none';
    const div=document.createElement('div');
    div.className='nft-card';
    div.setAttribute('data-nft-id', nft.id);
    div.innerHTML=`<div class="nft-canvas-wrap"><canvas id="c-${nft.id}" width="512" height="512"></canvas></div>
      <div class="nft-label">${nft.trait}</div>
      <div class="rarity-badge" style="color:${RARITY_COLORS[nft.rarity]}; border:1px solid ${RARITY_COLORS[nft.rarity]}44;">${nft.rarity}</div>
      <div class="dl-row">
        <button class="view-btn" data-id="${nft.id}">◉ VIEW</button>
        <button class="dl-png-btn" data-id="${nft.id}">↓ PNG</button>
        <button class="dl-json-btn" data-id="${nft.id}">↓ JSON</button>
      </div>`;
    grid.appendChild(div);
    const canvas=document.getElementById('c-'+nft.id);
    drawRobot(canvas, nft, 14);
    
    // event listeners using closure
    const viewBtn = div.querySelector('.view-btn');
    const pngBtn = div.querySelector('.dl-png-btn');
    const jsonBtn = div.querySelector('.dl-json-btn');
    viewBtn.addEventListener('click', (e) => { e.stopPropagation(); openModal(nft.id); });
    pngBtn.addEventListener('click', (e) => { e.stopPropagation(); dlPng(nft.id); });
    jsonBtn.addEventListener('click', (e) => { e.stopPropagation(); dlJson(nft.id); });
  }

  function openModal(id){
    selectedNft = nfts.find(n=>n.id===id);
    if(!selectedNft) return;
    const mc = document.getElementById('modal-canvas');
    drawRobot(mc, selectedNft, 20);
    document.getElementById('modal-name').textContent = `ROBO #${selectedNft.idx} — ${selectedNft.trait}`;
    document.getElementById('modal-meta').innerHTML = `
      <tr><td>Rarity</td><td style="color:${RARITY_COLORS[selectedNft.rarity]}">${selectedNft.rarity}</td></tr>
      <tr><td>Trait</td><td>${selectedNft.trait}</td></tr>
      <tr><td>Power</td><td>${selectedNft.power}</td></tr>
      <tr><td>Defense</td><td>${selectedNft.defense}</td></tr>
      <tr><td>Speed</td><td>${selectedNft.speed}</td></tr>
      <tr><td>ID</td><td style="font-size:9px;">${selectedNft.id}</td></tr>
    `;
    document.getElementById('modal-bg').style.display='flex';
  }

  document.getElementById('gen1').onclick = () => {
    const nft = genNft(nfts.length);
    nfts.push(nft);
    addNftCard(nft);
    document.getElementById('countLbl').textContent = `COLLECTION: ${nfts.length}`;
    showToast(`Minted #${nft.idx} — ${nft.trait} (${nft.rarity})`, 1300);
  };

  document.getElementById('gen10').onclick = () => {
    for(let i=0;i<10;i++){ 
      const nft = genNft(nfts.length);
      nfts.push(nft);
      addNftCard(nft);
    }
    document.getElementById('countLbl').textContent = `COLLECTION: ${nfts.length}`;
    showToast(`⚡ 10 new robots minted!`, 1600);
  };

  document.getElementById('dlAll').onclick = exportAll;

  document.getElementById('modal-close').onclick = () => {
    document.getElementById('modal-bg').style.display='none';
  };
  document.getElementById('modal-bg').onclick = (e) => {
    if(e.target.id === 'modal-bg') document.getElementById('modal-bg').style.display='none';
  };
  document.getElementById('modal-dl-png').onclick = () => { if(selectedNft) dlPng(selectedNft.id); };
  document.getElementById('modal-dl-json').onclick = () => { if(selectedNft) dlJson(selectedNft.id); };

  // initial empty state sync
  window.updateCount = () => {
    const lbl = document.getElementById('countLbl');
    if(lbl) lbl.textContent = `COLLECTION: ${nfts.length}`;
  };
})();
</script>
</body>
</html>
